arch: amd64
cores: 2
features: nesting=1,keyctl=1
hostname: openclaw
memory: 6000
net0: name=eth0,bridge=vmbr0,hwaddr=BC:24:11:69:CF:6C,ip=dhcp,type=veth
onboot: 0
ostype: ubuntu
rootfs: local-lvm:vm-104-disk-1,size=32G
swap: 6000
tags: community-script;os
timezone: America/Chicago

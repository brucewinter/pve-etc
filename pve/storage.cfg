dir: local
	path /var/lib/vz
	content iso,images,vztmpl,backup
	shared 0

lvmthin: local-lvm
	thinpool data
	vgname pve
	content rootdir,images

cifs: nas-backup
	path /mnt/pve/nas-backup
	server 192.168.86.180
	share backup
	content images,vztmpl,iso,import,backup,rootdir,snippets
	prune-backups keep-all=1
	subdir /proxmox
	username winter

cifs: web_packages
	path /mnt/pve/web_packages
	server 192.168.86.180
	share web_packages
	content images
	prune-backups keep-all=1
	username winter

